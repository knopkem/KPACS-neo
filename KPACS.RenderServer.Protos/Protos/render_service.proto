// ------------------------------------------------------------------------------------------------
// K-PACS Render Server — gRPC service contracts
//
// Defines the remote rendering API that allows a thin client to request
// volume loading, frame rendering, and interactive viewport manipulation
// while the heavy compute runs on a GPU-equipped server.
// ------------------------------------------------------------------------------------------------

syntax = "proto3";

option csharp_namespace = "KPACS.RenderServer.Protos";

package kpacs.render;

// ============================================================================
// Top-level services
// ============================================================================

/// Session lifecycle — authenticate, create / destroy rendering sessions.
service SessionService {
  /// Create a new rendering session and reserve server-side resources.
  rpc CreateSession   (CreateSessionRequest)   returns (CreateSessionResponse);
  /// Destroy a session and free all server-side resources.
  rpc DestroySession  (DestroySessionRequest)  returns (DestroySessionResponse);
  /// Heartbeat / keep-alive so the server can reap idle sessions.
  rpc Heartbeat       (HeartbeatRequest)       returns (HeartbeatResponse);
  /// List active sessions (admin / diagnostics).
  rpc ListSessions    (ListSessionsRequest)    returns (ListSessionsResponse);
}

/// Volume management — load DICOM series into GPU memory.
service VolumeService {
  /// Load a DICOM series from a server-local path into a session.
  rpc LoadVolume      (LoadVolumeRequest)      returns (LoadVolumeResponse);
  /// Unload a volume and release GPU/CPU memory.
  rpc UnloadVolume    (UnloadVolumeRequest)    returns (UnloadVolumeResponse);
  /// Query metadata for a loaded volume.
  rpc GetVolumeInfo   (GetVolumeInfoRequest)   returns (VolumeInfo);
}

/// Study browser — search and inspect studies/series from the server's imagebox database.
service StudyBrowserService {
  /// Search for studies matching the given criteria.
  rpc SearchStudies    (StudySearchRequest)      returns (StudySearchResponse);
  /// Get full details (series + instance counts) for one study.
  rpc GetStudyDetails  (GetStudyDetailsRequest)  returns (StudyDetailsResponse);
}

/// Interactive rendering — the core pixel-streaming loop.
service RenderService {
  /// Bidirectional stream: client sends viewport state updates,
  /// server responds with compressed frames.
  rpc InteractiveRender (stream RenderRequest) returns (stream RenderResponse);

  /// One-shot high-quality render (e.g. for secondary capture / printing).
  rpc RenderSnapshot    (RenderSnapshotRequest) returns (RenderSnapshotResponse);
}

// ============================================================================
// Session messages
// ============================================================================

message CreateSessionRequest {
  /// Human-readable client identifier (hostname / username).
  string client_name = 1;
  /// Requested maximum viewport count for this session.
  int32 max_viewports = 2;
}

message CreateSessionResponse {
  string session_id = 1;
  ServerCapabilities capabilities = 2;
}

message ServerCapabilities {
  string gpu_device_name = 1;
  int64  gpu_memory_bytes = 2;
  bool   opencl_available = 3;
  bool   hardware_encoder_available = 4;
  int32  max_concurrent_sessions = 5;
  string server_version = 6;
}

message DestroySessionRequest  { string session_id = 1; }
message DestroySessionResponse { bool   success     = 1; }

message HeartbeatRequest  { string session_id = 1; }
message HeartbeatResponse { bool   alive      = 1; }

message ListSessionsRequest {}
message ListSessionsResponse {
  repeated SessionInfo sessions = 1;
}

message SessionInfo {
  string session_id   = 1;
  string client_name  = 2;
  int32  viewport_count = 3;
  int64  created_at_unix_ms = 4;
  int64  last_heartbeat_unix_ms = 5;
}

// ============================================================================
// Volume messages
// ============================================================================

message LoadVolumeRequest {
  string session_id = 1;
  /// Server-local directory or file path to the DICOM series (legacy / fallback).
  string series_path = 2;
  /// Optional: series instance UID for disambiguation.
  string series_instance_uid = 3;
  /// Preferred: load by series_key from the imagebox database.
  int64 series_key = 4;
}

message LoadVolumeResponse {
  string volume_id = 1;
  VolumeInfo info   = 2;
}

message UnloadVolumeRequest {
  string session_id = 1;
  string volume_id  = 2;
}

message UnloadVolumeResponse {
  bool success = 1;
}

message GetVolumeInfoRequest {
  string session_id = 1;
  string volume_id  = 2;
}

message VolumeInfo {
  string volume_id = 1;
  int32  size_x    = 2;
  int32  size_y    = 3;
  int32  size_z    = 4;
  double spacing_x = 5;
  double spacing_y = 6;
  double spacing_z = 7;
  Vec3   origin    = 8;
  Vec3   row_direction    = 9;
  Vec3   column_direction = 10;
  Vec3   normal           = 11;
  double default_window_center = 12;
  double default_window_width  = 13;
  int32  min_value = 14;
  int32  max_value = 15;
  bool   is_monochrome1 = 16;
  int32  slice_count = 17;
}

// ============================================================================
// Rendering messages — interactive loop
// ============================================================================

message RenderRequest {
  string session_id = 1;
  string volume_id  = 2;

  /// Which viewport this request targets (multi-viewport sessions).
  int32 viewport_index = 3;

  /// The full viewport state the server should render.
  ViewportState viewport_state = 4;

  /// Hint: is the user currently interacting (scroll / orbit / window)?
  /// Allows the server to reduce quality for faster feedback.
  bool is_interacting = 5;

  /// Sequence number for request-response correlation.
  uint64 sequence = 6;
}

message RenderResponse {
  /// Echoed sequence number from the request that produced this frame.
  uint64 sequence = 1;

  int32 viewport_index = 2;

  /// Compressed frame payload.
  bytes frame_data = 3;

  /// Encoding of frame_data.
  FrameEncoding encoding = 4;

  /// Dimensions of the decoded frame.
  int32 frame_width  = 5;
  int32 frame_height = 6;

  /// Server-side render time in milliseconds (for diagnostics).
  double render_time_ms = 7;
  /// Server-side encode time in milliseconds.
  double encode_time_ms = 8;

  /// Which compute backend produced the frame.
  string render_backend = 9;

  /// Optional per-frame metadata (orientation labels, pixel info, etc.)
  FrameMetadata metadata = 10;
}

enum FrameEncoding {
  FRAME_ENCODING_RAW_BGRA32 = 0;
  FRAME_ENCODING_JPEG       = 1;
  FRAME_ENCODING_WEBP       = 2;
  FRAME_ENCODING_PNG        = 3;
}

message FrameMetadata {
  /// Pixel spacing of the rendered view (mm/pixel).
  double pixel_spacing_x = 1;
  double pixel_spacing_y = 2;
  /// Current slice index (for MPR modes).
  int32  slice_index = 3;
  int32  slice_count = 4;
  /// Orientation label string, e.g. "Axial", "Coronal", "Sagittal".
  string orientation_label = 5;
  /// Projection mode label.
  string projection_mode_label = 6;
  /// Window center / width applied.
  double window_center = 7;
  double window_width  = 8;
}

// ============================================================================
// Snapshot (high-quality one-shot render)
// ============================================================================

message RenderSnapshotRequest {
  string session_id = 1;
  string volume_id  = 2;
  ViewportState viewport_state = 3;
  /// Target resolution for the snapshot (can be higher than interactive).
  int32 output_width  = 4;
  int32 output_height = 5;
  FrameEncoding preferred_encoding = 6;
  /// JPEG / WebP quality 0..100.
  int32 quality = 7;
}

message RenderSnapshotResponse {
  bytes frame_data = 1;
  FrameEncoding encoding = 2;
  int32 frame_width  = 3;
  int32 frame_height = 4;
  double render_time_ms = 5;
  FrameMetadata metadata = 6;
}

// ============================================================================
// Viewport state — everything the server needs to produce a frame.
// ============================================================================

message ViewportState {
  /// Render mode selector.
  RenderMode render_mode = 1;

  // --- MPR / Slab state ---
  SliceOrientation orientation = 2;
  int32  slice_index = 3;
  double projection_thickness_mm = 4;
  ProjectionMode projection_mode = 5;

  // --- Oblique plane tilt ---
  double tilt_around_column_rad = 6;
  double tilt_around_row_rad    = 7;

  // --- DVR camera + shading ---
  DvrState dvr_state = 8;

  // --- Windowing ---
  double window_center = 9;
  double window_width  = 10;

  // --- Color scheme ---
  int32 color_scheme = 11;

  // --- View transform (pan / zoom / flip / rotate) ---
  double zoom_factor = 12;
  double pan_x       = 13;
  double pan_y       = 14;
  bool   flip_horizontal = 15;
  bool   flip_vertical   = 16;
  int32  rotation_quarter_turns = 17;

  // --- Output size ---
  int32 output_width  = 18;
  int32 output_height = 19;
}

enum RenderMode {
  RENDER_MODE_MPR = 0;
  RENDER_MODE_DVR = 1;
}

enum SliceOrientation {
  SLICE_ORIENTATION_AXIAL    = 0;
  SLICE_ORIENTATION_CORONAL  = 1;
  SLICE_ORIENTATION_SAGITTAL = 2;
}

enum ProjectionMode {
  PROJECTION_MODE_MPR    = 0;
  PROJECTION_MODE_MIP_PR = 1;
  PROJECTION_MODE_MIN_PR = 2;
  PROJECTION_MODE_MP_VRT = 3;
  PROJECTION_MODE_DVR    = 4;
}

// ============================================================================
// DVR (Direct Volume Rendering) state
// ============================================================================

message DvrState {
  /// Camera
  Vec3   camera_position = 1;
  Vec3   camera_target   = 2;
  Vec3   camera_up       = 3;
  double field_of_view_degrees = 4;
  double orthographic_scale    = 5;
  CameraProjection projection  = 6;
  double orthographic_width_mm  = 7;
  double orthographic_height_mm = 8;

  /// Shading
  Vec3   light_direction     = 9;
  double ambient_intensity   = 10;
  double diffuse_intensity   = 11;
  double specular_intensity  = 12;
  double shininess           = 13;

  /// Ray-marching
  double sampling_step_factor           = 14;
  double opacity_termination_threshold  = 15;

  /// Slab (sub-volume clipping)
  double slab_thickness_mm = 16;
  Vec3   slab_center       = 17;
  Vec3   slab_normal       = 18;

  /// Transfer function
  TransferFunctionState transfer_function = 19;
}

enum CameraProjection {
  CAMERA_PROJECTION_ORTHOGRAPHIC = 0;
  CAMERA_PROJECTION_PERSPECTIVE  = 1;
}

message TransferFunctionState {
  TransferFunctionPreset preset = 1;
  double min_value = 2;
  double max_value = 3;
  /// Optional windowed sub-range for auto-color DVR.
  double window_center = 4;
  double window_width  = 5;
  bool   enable_auto_color = 6;
  /// Gradient modulation strength.
  double gradient_modulation_strength = 7;
}

enum TransferFunctionPreset {
  TRANSFER_FUNCTION_PRESET_DEFAULT       = 0;
  TRANSFER_FUNCTION_PRESET_BONE          = 1;
  TRANSFER_FUNCTION_PRESET_SOFT_TISSUE   = 2;
  TRANSFER_FUNCTION_PRESET_LUNG          = 3;
  TRANSFER_FUNCTION_PRESET_ANGIO         = 4;
  TRANSFER_FUNCTION_PRESET_SKIN          = 5;
  TRANSFER_FUNCTION_PRESET_ENDOSCOPY     = 6;
  TRANSFER_FUNCTION_PRESET_PET_HOT_IRON  = 7;
  TRANSFER_FUNCTION_PRESET_PET_SPECTRUM  = 8;
  TRANSFER_FUNCTION_PRESET_PERFUSION     = 9;
}

// ============================================================================
// Study browser messages
// ============================================================================

message StudySearchRequest {
  /// Free text — matches patient name, patient ID, accession number, description.
  string quick_search = 1;
  /// Optional structured filters.
  string patient_id = 2;
  string patient_name = 3;
  string accession_number = 4;
  string study_description = 5;
  string referring_physician = 6;
  /// Modality filter (e.g. "CT", "MR"). Empty = all.
  repeated string modalities = 7;
  /// Date range (DICOM format YYYYMMDD). Empty = no filter.
  string from_study_date = 8;
  string to_study_date   = 9;
  /// Maximum results. 0 = server default (200).
  int32 max_results = 10;
}

message StudySearchResponse {
  repeated StudySummary studies = 1;
}

message StudySummary {
  int64  study_key          = 1;
  string study_instance_uid = 2;
  string patient_name       = 3;
  string patient_id         = 4;
  string patient_birth_date = 5;
  string accession_number   = 6;
  string study_description  = 7;
  string referring_physician = 8;
  string study_date         = 9;
  string modalities         = 10;
  int32  series_count       = 11;
  int32  instance_count     = 12;
}

message GetStudyDetailsRequest {
  int64 study_key = 1;
}

message StudyDetailsResponse {
  StudySummary study = 1;
  repeated SeriesSummary series = 2;
}

message SeriesSummary {
  int64  series_key          = 1;
  string series_instance_uid = 2;
  string modality            = 3;
  string body_part           = 4;
  string series_description  = 5;
  int32  series_number       = 6;
  int32  instance_count      = 7;
}

// ============================================================================
// Common types
// ============================================================================

message Vec3 {
  double x = 1;
  double y = 2;
  double z = 3;
}
